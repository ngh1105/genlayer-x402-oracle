name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  contracts:
    name: Intelligent Contract (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile contracts
        run: |
          python -m py_compile contracts/x402_oracle.py
          echo "contracts compiled OK"

      - name: Install test deps
        run: pip install pytest

      - name: Run unit tests
        run: pytest -q

  frontend:
    name: Frontend typecheck (advisory)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Frontend client is wired to the pinned genlayer-js SDK and must
      # typecheck cleanly. This job is blocking.
      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck
